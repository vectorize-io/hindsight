<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collabmind — Operator Cockpit</title>
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#0a0e14;
  --bg-1:#0e131c;
  --bg-2:#131a26;
  --bg-3:#1a2333;
  --panel:#10161f;
  --line:#1e2937;
  --line-2:#283648;
  --txt:#c7d2e0;
  --txt-dim:#7c8aa0;
  --txt-mute:#54627a;
  --cyan:#39d4d4;
  --cyan-dim:#1d8a8a;
  --green:#3fd07a;
  --amber:#f5b942;
  --red:#f05d6c;
  --blue:#5b8def;
  --violet:#9d7bf0;
  --pg:#5b8def;       /* postgres */
  --d1:#f5b942;       /* d1 edge */
  --om:#9d7bf0;       /* openmemory */
  --xai:#3fd07a;      /* xai */
  --mem0:#39d4d4;     /* mem0 */
  --gw:#f05d6c;       /* gateway */
  --local:#7c8aa0;    /* local */
  --mono:'JetBrains Mono','SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:var(--mono);
  font-feature-settings:"tnum" 1,"zero" 1;
  overflow:hidden;
  height:100vh;
  -webkit-font-smoothing:antialiased;
}
/* subtle scanline texture */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,0.012) 0 1px,transparent 1px 3px);
  mix-blend-mode:overlay;opacity:.5;
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:#3a4a60}

/* ============ APP GRID ============ */
#app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}

/* ============ TOP BAR ============ */
.topbar{
  display:flex;align-items:center;gap:0;
  background:linear-gradient(180deg,#0e131c,#0a0e14);
  border-bottom:1px solid var(--line-2);
  height:46px;padding:0 14px;position:relative;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;padding-right:18px;border-right:1px solid var(--line)}
.brand .logo{
  width:22px;height:22px;border-radius:3px;
  background:conic-gradient(from 140deg,var(--cyan),var(--violet),var(--green),var(--cyan));
  box-shadow:0 0 12px rgba(57,212,212,.4);position:relative;
}
.brand .logo::after{content:"";position:absolute;inset:5px;border-radius:1px;background:var(--bg)}
.brand .name{font-weight:700;letter-spacing:.5px;font-size:13px}
.brand .name b{color:var(--cyan)}
.brand .sub{font-size:9px;color:var(--txt-mute);letter-spacing:1.5px;text-transform:uppercase}

.tabs{display:flex;height:100%;margin-left:6px}
.tab{
  display:flex;align-items:center;gap:7px;padding:0 18px;height:100%;
  font-size:11.5px;letter-spacing:.5px;color:var(--txt-dim);cursor:pointer;
  border-right:1px solid var(--line);position:relative;background:transparent;
  text-transform:uppercase;font-weight:500;transition:color .15s,background .15s;
}
.tab .dot{width:5px;height:5px;border-radius:50%;background:var(--txt-mute)}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.02)}
.tab.active{color:#fff;background:var(--bg-2)}
.tab.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.tab.active .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

.topbar .spacer{flex:1}
.sysclock{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--txt-dim)}
.sysclock .kv{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2}
.sysclock .kv .lbl{font-size:8px;color:var(--txt-mute);letter-spacing:1px;text-transform:uppercase}
.sysclock .kv .val{font-size:12px;color:var(--txt)}
.sysclock .val .ok{color:var(--green)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ============ MAIN ============ */
.main{overflow:hidden;position:relative}
.view{display:none;height:100%;overflow:auto;padding:14px}
.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ============ STATUS BAR ============ */
.statusbar{
  display:flex;align-items:center;gap:0;height:26px;
  background:#0c1119;border-top:1px solid var(--line-2);
  font-size:10.5px;color:var(--txt-dim);padding:0 12px;letter-spacing:.3px;z-index:50;
}
.statusbar .seg{display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;border-right:1px solid var(--line)}
.statusbar .seg:first-child{padding-left:0}
.statusbar .seg b{color:var(--txt)}
.statusbar .spacer{flex:1}
.statusbar .blink{animation:blink 1.1s steps(2) infinite}
@keyframes blink{50%{opacity:0}}

/* ============ PANELS ============ */
.panel{
  background:var(--panel);border:1px solid var(--line);border-radius:5px;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.panel-h{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.018),transparent);
  font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt-dim);font-weight:600;
}
.panel-h .ico{width:12px;height:12px;opacity:.7}
.panel-h .tag{margin-left:auto;font-size:9px;color:var(--txt-mute);letter-spacing:.5px;font-weight:500}
.panel-b{padding:12px;flex:1;overflow:auto}
.panel-h .live{display:flex;align-items:center;gap:5px;margin-left:auto;color:var(--green);font-size:9px;letter-spacing:.5px}
.panel-h .live .pulse{width:5px;height:5px}

/* utility */
.row{display:flex;gap:12px}
.col{display:flex;flex-direction:column;gap:12px}
.grid{display:grid;gap:12px}
.muted{color:var(--txt-mute)}
.dim{color:var(--txt-dim)}
.mono{font-family:var(--mono)}
.right{text-align:right}
.nowrap{white-space:nowrap}

/* ============ METRIC TILES ============ */
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:12px}
.metric{
  background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:11px 13px;
  position:relative;overflow:hidden;
}
.metric::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cyan);opacity:.6}
.metric.m-green::before{background:var(--green)}
.metric.m-amber::before{background:var(--amber)}
.metric.m-red::before{background:var(--red)}
.metric.m-blue::before{background:var(--blue)}
.metric.m-violet::before{background:var(--violet)}
.metric .ml{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-mute);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.metric .mv{font-size:23px;font-weight:600;color:#fff;line-height:1;letter-spacing:-.5px}
.metric .mv small{font-size:11px;color:var(--txt-dim);font-weight:400}
.metric .md{font-size:9.5px;margin-top:6px;color:var(--txt-dim);display:flex;align-items:center;gap:4px}
.delta-up{color:var(--green)}
.delta-dn{color:var(--red)}
.spark{height:22px;width:100%;margin-top:6px;display:block}

/* ============ BADGES ============ */
.badge{
  display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:3px;
  font-size:9.5px;letter-spacing:.5px;font-weight:600;text-transform:uppercase;border:1px solid;
}
.b-green{color:var(--green);border-color:rgba(63,208,122,.4);background:rgba(63,208,122,.1)}
.b-amber{color:var(--amber);border-color:rgba(245,185,66,.4);background:rgba(245,185,66,.1)}
.b-red{color:var(--red);border-color:rgba(240,93,108,.4);background:rgba(240,93,108,.1)}
.b-blue{color:var(--blue);border-color:rgba(91,141,239,.4);background:rgba(91,141,239,.1)}
.b-cyan{color:var(--cyan);border-color:rgba(57,212,212,.4);background:rgba(57,212,212,.1)}
.b-violet{color:var(--violet);border-color:rgba(157,123,240,.4);background:rgba(157,123,240,.1)}
.b-grey{color:var(--txt-dim);border-color:var(--line-2);background:rgba(255,255,255,.03)}
.b-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ============ TABLES ============ */
table.t{width:100%;border-collapse:collapse;font-size:11px}
table.t th{
  text-align:left;padding:7px 10px;font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt-mute);border-bottom:1px solid var(--line-2);font-weight:600;position:sticky;top:0;background:var(--panel);
}
table.t td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--txt);vertical-align:middle}
table.t tr:hover td{background:rgba(91,141,239,.05)}
table.t tr{cursor:default}
table.t .num{text-align:right;font-variant-numeric:tabular-nums}
table.t tr.clickable{cursor:pointer}
table.t tr.clickable:hover td{background:rgba(57,212,212,.06)}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:4px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.4px;cursor:pointer;
  background:var(--bg-2);border:1px solid var(--line-2);color:var(--txt-dim);
  transition:all .13s;text-transform:uppercase;font-weight:500;
}
.btn:hover{border-color:var(--cyan-dim);color:var(--cyan);background:rgba(57,212,212,.06)}
.btn.primary{background:rgba(57,212,212,.12);border-color:var(--cyan-dim);color:var(--cyan)}
.btn.primary:hover{background:rgba(57,212,212,.2);box-shadow:0 0 12px rgba(57,212,212,.25)}
.btn.danger:hover{border-color:var(--red);color:var(--red);background:rgba(240,93,108,.08)}
.btn.green:hover{border-color:var(--green);color:var(--green);background:rgba(63,208,122,.08)}
.btn:active{transform:translateY(1px)}
.btn.sm{padding:3px 8px;font-size:9.5px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}

/* ============ BARS ============ */
.bar{height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden;position:relative}
.bar > i{display:block;height:100%;border-radius:3px;background:var(--cyan);transition:width .6s}
.barlabel{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;color:var(--txt-dim)}

/* segmented control */
.seg-ctl{display:inline-flex;background:var(--bg);border:1px solid var(--line-2);border-radius:5px;padding:2px;gap:2px}
.seg-ctl button{
  background:transparent;border:0;color:var(--txt-dim);font-family:var(--mono);font-size:10px;
  padding:4px 11px;border-radius:3px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .13s;
}
.seg-ctl button:hover{color:var(--txt)}
.seg-ctl button.on{background:var(--cyan);color:#04181a;font-weight:600;box-shadow:0 0 10px rgba(57,212,212,.3)}

/* toggle */
.tg{width:34px;height:18px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line-2);position:relative;cursor:pointer;transition:all .2s;flex:none}
.tg::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:var(--txt-mute);transition:all .2s}
.tg.on{background:rgba(57,212,212,.25);border-color:var(--cyan-dim)}
.tg.on::after{left:17px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* log feed */
.feed{font-size:10.5px;line-height:1.65}
.feed .ln{display:flex;gap:9px;padding:2px 0;border-bottom:1px solid rgba(30,41,55,.4);white-space:nowrap}
.feed .ln .ts{color:var(--txt-mute);flex:none}
.feed .ln .lv{flex:none;width:40px;font-weight:600}
.feed .ln .lv.INFO{color:var(--blue)}
.feed .ln .lv.OK{color:var(--green)}
.feed .ln .lv.WARN{color:var(--amber)}
.feed .ln .lv.ERR{color:var(--red)}
.feed .ln .src{color:var(--violet);flex:none;width:120px;overflow:hidden;text-overflow:ellipsis}
.feed .ln .msg{color:var(--txt-dim);overflow:hidden;text-overflow:ellipsis}

/* dot grid heat */
.heat{display:flex;gap:3px;flex-wrap:wrap}
.heat i{width:9px;height:9px;border-radius:2px;background:var(--bg-3)}

/* engine pill */
.epill{display:inline-flex;align-items:center;gap:6px;font-size:10.5px}
.epill .sw{width:8px;height:8px;border-radius:2px;flex:none}

/* tooltip-ish kv list */
.kvlist{display:flex;flex-direction:column;gap:0}
.kvlist .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:11px}
.kvlist .kv .k{color:var(--txt-mute)}
.kvlist .kv .v{color:var(--txt)}

/* section title */
.sec-t{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-mute);margin:2px 0 10px;font-weight:600}
.sec-t::after{content:"";flex:1;height:1px;background:var(--line)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,8,12,.7);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex;animation:fade .2s}
.modal{width:560px;max-width:92vw;max-height:84vh;background:var(--bg-1);border:1px solid var(--line-2);border-radius:7px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.modal-h{padding:13px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px;background:var(--bg-2)}
.modal-h .x{margin-left:auto;cursor:pointer;color:var(--txt-mute);font-size:16px;line-height:1}
.modal-h .x:hover{color:var(--red)}
.modal-b{padding:16px;overflow:auto}
.codeblock{background:#070a0f;border:1px solid var(--line);border-radius:5px;padding:11px 13px;font-size:10.5px;line-height:1.6;color:var(--cyan);white-space:pre;overflow:auto}
.codeblock .k{color:var(--violet)}.codeblock .s{color:var(--green)}.codeblock .n{color:var(--amber)}.codeblock .c{color:var(--txt-mute)}

/* input */
.inp{background:#070a0f;border:1px solid var(--line-2);border-radius:4px;color:var(--txt);font-family:var(--mono);font-size:11px;padding:7px 10px;width:100%}
.inp:focus{outline:none;border-color:var(--cyan-dim);box-shadow:0 0 0 2px rgba(57,212,212,.12)}
.inp::placeholder{color:var(--txt-mute)}

/* flash highlight on live update */
.flash{animation:flash 1s}
@keyframes flash{0%{background:rgba(57,212,212,.18)}100%{background:transparent}}
</style>
</head>

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function spark(vals,color='var(--cyan)',w=120,h=22){
  const max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-((v-min)/rng)*(h-3)-1).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4"/><polyline points="0,${h} ${pts} ${w},${h}" fill="${color}" opacity="0.08" stroke="none"/></svg>`;
}
function rnd(a,b){return a+Math.random()*(b-a)}
function randSeries(n,a,b){return Array.from({length:n},()=>rnd(a,b))}

function pushFeed(seed){
  const box=$('#feedbox'); if(!box)return;
  const m=FEEDMSG[Math.floor(Math.random()*FEEDMSG.length)];
  const now=new Date(); const ts=now.toISOString().slice(11,23);
  const ln=el('div','ln'+(seed?'':' flash'),
    `<span class="ts">${ts}</span><span class="lv ${m[0]}">${m[0]}</span><span class="src">${m[1]}</span><span class="msg">${m[2]}</span>`);
  box.appendChild(ln);

      <td><span class="badge b-cyan" style="font-size:8.5px">${r.strat}</span></td></tr>`;
  });
  rtbl.appendChild(rtb); rpb.appendChild(rtbl); rp.appendChild(rpb); rc.appendChild(rp);

  // policy / guardrails
  const pp=el('div','panel'); pp.style.flex='1';
  pp.appendChild(el('div','panel-h','&#9911; Guardrails &amp; Policy'));
  const ppb=el('div','panel-b');
  const policies=[
    ['Metadata filters before vector query','on',true],
    ['Operator approval gate (draft→approved)','on',true],
    ['Auto-promote on high eval score','off',false],
    ['Auto-retrain / fine-tune','off',false],
    ['Transparent token (single sign-on)','on',true],
    ['D1 edge fallback to Postgres on stale','on',true],
  ];
  policies.forEach(p=>{
    const row=el('div'); row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)';
    row.innerHTML=`<div class="tg ${p[1]==='on'?'on':''}" onclick="this.classList.toggle('on');toast('Policy: ${p[0]} → '+(this.classList.contains('on')?'ON':'OFF'))"></div>
      <span style="font-size:10.5px;flex:1">${p[0]}</span>
      ${!p[2]?'<span class="badge b-grey" style="font-size:8px">requires approval</span>':'<span class="badge b-green" style="font-size:8px">enforced</span>'}`;
    ppb.appendChild(row);
  });
  pp.appendChild(ppb); rc.appendChild(pp);
  grid.appendChild(rc); v.appendChild(grid);

  // wire strategy control
  setStrat('tiered');
  $$('#stratCtl button').forEach(b=>b.onclick=()=>{$$('#stratCtl button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setStrat(b.dataset.s);});
}
const STRAT_DESC={
  fanout:'Query <b>every</b> enabled engine in parallel, normalize, merge with Reciprocal Rank Fusion, dedupe by source id. Highest recall & cost — best for critical/cross-domain queries.',
  single:'Router picks <b>one</b> engine by scope or metadata engine_hint. Lowest latency & cost — best when a scope maps cleanly to one engine.',
  tiered:'Hit the <b>fast</b> engine (gateway/edge) first; escalate to the <b>deep</b> cognitive engine (OpenMemory) only if confidence is low. Balanced default.',
  auto:'Router chooses strategy per query class using policy + recent eval scores. Adaptive — cost varies.'
};
function setStrat(s){activeStrategy=s;const d=$('#stratDesc');if(d)d.innerHTML=STRAT_DESC[s];$('#sb-strat').textContent=s==='single'?'single-route':s;}
function adapterModal(e){
  openModal(`&#9638; ${e.label}`,`
    <div class="kvlist">
      <div class="kv"><span class="k">adapter_id</span><span class="v mono" style="font-size:10px">${e.id}</span></div>
      <div class="kv"><span class="k">engine</span><span class="v">${e.engine}</span></div>
      <div class="kv"><span class="k">status</span><span class="v">${e.status}</span></div>
      <div class="kv"><span class="k">api_type</span><span class="v">${e.api}</span></div>
      <div class="kv"><span class="k">endpoint</span><span class="v">${e.endpoint}</span></div>
      <div class="kv"><span class="k">auth_type</span><span class="v">${e.auth}</span></div>
      <div class="kv"><span class="k">vector_backend</span><span class="v">${e.vec} · ${e.dim}d</span></div>
      <div class="kv"><span class="k">scopes</span><span class="v">${e.scopes.join(', ')}</span></div>
      <div class="kv"><span class="k">capabilities</span><span class="v">filter:${e.caps.filter} decay:${e.caps.decay} sectors:${e.caps.sectors}</span></div>
      <div class="kv"><span class="k">24h calls / err</span><span class="v">${e.calls.toLocaleString()} / ${e.err}%</span></div>
    </div>
    <div class="sec-t" style="margin-top:16px">EngineAdapter interface — implemented</div>
    <div class="codeblock"><span class="k">export const</span> adapter = {
  <span class="k">id</span>: <span class="s">"${e.id}"</span>,
  <span class="k">engine</span>: <span class="s">"${e.engine}"</span>,
  <span class="k">capabilities</span>: { filter:${e.caps.filter}, decay:${e.caps.decay}, sectors:${e.caps.sectors} },
  <span class="k">async</span> remember(input) { <span class="c">/* → ${e.endpoint} */</span> },
  <span class="k">async</span> search({query,filters,limit}) { <span class="c">/* metadata-first */</span> }
}</div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn green" onclick="toast('Health: ${e.label} OK · ${e.p95}s p95')">&#10003; Test adapter</button>
      <button class="btn" onclick="toast('Promoted ${e.status}→canonical (dry-run)')">&#9650; Change status</button>
      <button class="btn danger" onclick="toast('${e.label} disabled — router will skip')">&#9888; Disable</button>
    </div>`);
}
/* ================= MODAL / TOAST ================= */
function openModal(title,html){
  $('#modal').innerHTML=`<div class="modal-h"><span style="font-size:13px;color:#fff;letter-spacing:.3px">${title}</span><span class="x" onclick="closeModal()">&times;</span></div><div class="modal-b">${html}</div>`;
  $('#modalbg').classList.add('show');
}
function closeModal(){$('#modalbg').classList.remove('show');}
$('#modalbg').onclick=e=>{if(e.target===$('#modalbg'))closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
let toastT;
function toast(msg){
  let t=$('#toast');
  if(!t){t=el('div');t.id='toast';t.style.cssText='position:fixed;bottom:42px;left:50%;transform:translateX(-50%);background:var(--bg-1);border:1px solid var(--cyan-dim);color:var(--cyan);padding:9px 18px;border-radius:5px;font-family:var(--mono);font-size:11px;z-index:300;box-shadow:0 8px 30px rgba(0,0,0,.5);letter-spacing:.3px;max-width:80vw';document.body.appendChild(t);}
  t.innerHTML='&#9656; '+msg; t.style.opacity='1';
  clearTimeout(toastT); toastT=setTimeout(()=>t.style.opacity='0',2600);
  t.style.transition='opacity .4s';
}

/* ================= TABS ================= */
$$('#tabs .tab').forEach(t=>t.onclick=()=>{
  $$('#tabs .tab').forEach(x=>x.classList.remove('active'));
  $$('.view').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  const view=t.dataset.view;
  $('#view-'+view).classList.add('active');
});

/* ================= LIVE LOOP ================= */
function clock(){
  const d=new Date();
  $('#clock').textContent=d.toISOString().slice(11,19);
}
function tick(){
  // feed
  if(Math.random()>0.35) pushFeed(false);
  // jitter status bar
  $('#sb-p95').textContent=(1.3+Math.random()*0.4).toFixed(2)+'s';
  $('#sb-cost').textContent='$'+(28+Math.random()*1.2).toFixed(2);
  const q=Math.random()>0.8?Math.floor(Math.random()*3):0;
  const qe=$('#sb-q'); qe.textContent=q; qe.style.color=q>0?'var(--amber)':'var(--green)';
}
clock(); setInterval(clock,1000);
setInterval(tick,1400);

/* ================= BOOT ================= */
renderMonitor();
renderMemory();
renderGovern();
// wire memory search enter key
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='memq')runSearch();});
console.log('%cCollabmind Operator Cockpit ready','color:#39d4d4;font-family:monospace');
</script>
