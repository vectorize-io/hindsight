events {
    worker_connections 1024;
}

http {
    upstream model_runner {
        server model-runner.docker.internal:80;
        keepalive 32;
    }

    server {
        listen 80;
        
        location / {
            proxy_pass http://model_runner/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
